name: CI

on:
  push:
  pull_request:

jobs:
  pytest:
    # Windows runner: matches the project's only verified target platform.
    # audio_in.py/capture.py/main.py import sounddevice/mss/keyboard/
    # pywebview at module scope, and those native libraries are only
    # confirmed to import cleanly on Windows (see AGENTS.md tooling notes).
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .

      - name: Check Ruff formatting
        run: python -m ruff format --check .

      - name: Check Ruff lint and complexity
        run: python -m ruff check .

      - name: Run pure automated test suite
        run: python -m pytest
