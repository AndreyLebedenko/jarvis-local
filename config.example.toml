# Jarvis example configuration (v1.0 base + v1.1 controlled input).
#
# Copy this file to config.toml and edit as needed. config.toml is
# gitignored so personal tweaks (hotkeys, voice, sound cue paths) never
# get committed. If config.toml is absent, config.py falls back to
# built-in defaults that mirror the values shown here.
#
# A present section may omit keys; omitted keys fall back to their
# default. An unknown section or unknown key is a config error (typos
# are caught, not silently ignored).

[backend]
model = "gemma4:12b-it-qat"
endpoint = "http://localhost:11434"
num_ctx = 65536
# If VRAM pressure appears, PROJECT.md's fallback is
# OLLAMA_KV_CACHE_TYPE=q8_0, then num_ctx = 32768 (applied by the human,
# not automatically by this config).
# Optional spike knobs:
# flash_attention = true
# kv_cache_type = "q8_0"  # Ollama docs also list "f16" (default) and
# "q4_0"; leave both fields unset to preserve current behavior.
# Optional generation options. Leave unset to preserve current behavior;
# no project defaults are chosen here without local measurements.
# temperature = 0.2
# top_p = 0.9
# top_k = 40
# min_p = 0.05
# repeat_penalty = 1.1
# repeat_last_n = 64
# seed = 123
# num_predict = 128
# stop = ["</speak>"]
# draft_num_predict = 16
# httpx's own default timeout (~5 s) is too short for a genuinely cold
# Ollama start (verified live - longer than the day-0 "4.2 s cold" figure,
# which was itself measured on an already-touched model). Only the read
# timeout is this generous; connect/write/pool stay short (localhost).
read_timeout_seconds = 120.0

[hotkeys]
screenshot_full = "ctrl+alt+s"
screenshot_region = "ctrl+alt+r"
shutdown = "ctrl+alt+q"
# v1.1: toggles microphone capture on/off (privacy pause) - a single
# toggle, not separate sleep/wake bindings. See PROJECT.md's Architecture
# v1.1 section.
mic_sleep_toggle = "ctrl+alt+m"
# v1.1: reads the current clipboard and submits it as a prompt, in place
# of a spoken question.
clipboard_submit = "ctrl+alt+v"
# Thinking mode: toggles a persistent runtime state applied to future
# turns (not the current in-flight one). Off by default - see PROJECT.md's
# thinking-mode architecture section.
thinking_toggle = "ctrl+alt+t"

[vad]
threshold = 0.5
max_chunk_seconds = 30
# Silero itself splits raw speech into small segments at any internal
# pause (~100 ms, not configurable here). Adjacent segments closer
# together than request_end_pause_seconds are merged into one utterance
# (a breath or thinking pause mid-request, not the end of it). Only a
# gap at least this long - absence of detected speech, not necessarily
# full digital silence - is treated as the user actually finishing.
# Paid *before* PROJECT.md's ~3 s response-start window starts (that
# window is measured from publish, not from the literal instant speech
# stopped), so it adds to total perceived latency without counting
# against the ~3 s figure itself. 2.0 s is a deliberately conservative
# value for the development stage; production is expected to tighten it
# to ~1.0-1.5 s once request-boundary behavior is validated. See
# PROJECT.md's Architecture v1.0 and task-07's backlog notes.
request_end_pause_seconds = 2.0
# How long the busy flag stays up after Jarvis finishes speaking, before
# capture resumes and the "listening" cue plays. A short grace period,
# not an echo guard: since the stale-buffer-replay fix, auto-pause stops
# the stream and invalidates the buffer, so nothing heard during a turn
# can leak into the next one regardless of this value.
resume_cooldown_seconds = 1.0

# TTS parameters are route-specific. Config parsing validates their shape;
# model files and model/parameter compatibility are checked on first use.
[tts.languages.ru]
engine = "silero"
model = "v3_1_ru"
language = "ru"
speaker = "baya"
sample_rate = 48000
# Optional model.apply_tts parameters. Omit them to use the selected model's
# own defaults; unsupported model/parameter combinations fail on first use.
# put_accent = true
# put_yo = true

# Optional v1.2.9 bilingual route. Jarvis does not download Piper models at
# runtime; configure this only after placing the local .onnx model yourself.
# Any non-default routing must cover BOTH ru and en - charset segmentation
# emits English units for Latin text regardless of configuration.
# [tts.languages.en]
# engine = "piper"
# model = ".local-models/piper/en_US-lessac-medium/en_US-lessac-medium.onnx"
# config_path = ".local-models/piper/en_US-lessac-medium/en_US-lessac-medium.onnx.json"
# use_cuda = false
# speaker_id = 0
# length_scale = 1.0
# noise_scale = 0.667
# noise_w_scale = 0.8
# normalize_audio = true
# volume = 1.0

[capture]
default_mode = "full"

[microphone]
# "" means sounddevice's default input device. Also settable from the
# live Status Console's configuration menu (Model/Microphone selectors) -
# that writes config.ui.toml instead of this file, which takes precedence
# over whatever is set here per-key (see PROJECT.md's Architecture v1.2.4
# section). Restart-to-apply either way: takes effect on the next
# `python main.py` start, not live.
device = ""

[clipboard]
# 20000 chars (~5000 tokens at a rough 4 chars/token estimate): a
# conservative cap against an accidental huge paste (e.g. a log file)
# blowing up local-context latency. Text over this is truncated with a
# visible in-band marker, never silently cut.
max_chars = 20000

[sound_cues]
listening = "sounds/listening.wav"
thinking = "sounds/thinking.wav"
speaking = "sounds/speaking.wav"
error = "sounds/error.wav"
# v1.1: clipboard submission accepted / rejected (truncated or empty -
# distinct from the generic error above, which covers backend/TTS
# failures), and microphone sleep/wake.
clipboard = "sounds/clipboard.wav"
input_error = "sounds/input_error.wav"
mic_sleep = "sounds/mic_sleep.wav"
mic_wake = "sounds/mic_wake.wav"
# Thinking-mode toggle on/off - distinct from the generic "thinking" cue
# above, which plays per-turn while a request is in flight regardless of
# this mode.
thinking_on = "sounds/thinking_on.wav"
thinking_off = "sounds/thinking_off.wav"

[ui]
# Status Console / Touchstrip interface language: "en" (default) or "ru".
# UI chrome only - the assistant's dialog language, the system prompt,
# and TTS output are not affected by this setting.
language = "en"

[prompts]
# Dialog prompts sent to the model. `system` opens every turn's message
# list; `warmup` is the throwaway request sent once at startup before
# input is accepted. Both must be non-empty. These are dialog data, not
# UI text: they are independent of [ui].language. To switch the
# assistant's dialog language, replace them, e.g.:
# system = """You are Jarvis, the user's local voice assistant. Answer in
# English unless asked otherwise. Keep answers short: one or two
# sentences unless details are requested - longer answers take longer to
# speak. Do not use Markdown unless explicitly asked. If a screenshot of
# the user's screen arrives with a voice message, take it into account."""
# warmup = "Hello"
system = """Ты - Джарвис, локальный голосовой ассистент пользователя. Отвечай по-русски, если пользователь явно не попросил другой язык. Отвечай коротко и по существу: одно-два предложения, если не попросили подробностей - чем длиннее ответ, тем дольше пользователь ждёт, пока он прозвучит. Не используй Markdown, если пользователь явно не просит форматирование. Английские термины, API names, identifiers, короткие английские фразы и цитаты можно писать обычным текстом там, где они уместны; языковую разметку добавлять не нужно. Если вместе с голосовым сообщением пришёл скриншот экрана пользователя, отвечай с учётом того, что на нём видно."""
warmup = "Привет"

[mcp]
# Off by default (two-tier locality contract, PROJECT.md): with enabled =
# false, no MCP server process is spawned, no connection is opened, and
# the tool registry stays empty - equivalent to the capability not
# existing. Enable only if you understand a connected server can reach
# the network; every call is logged to the system events panel.
enabled = false
# Native Ollama tools are the measured default. "prompt" keeps the
# fallback JSON contract selectable for templates without native support.
presentation_strategy = "native"
# Total dispatches allowed during one user turn. Calls returned together
# are executed sequentially and consume this shared budget.
max_tool_calls_per_turn = 3
# Each configured server is its own stdio subprocess, with its own
# enable flag independent of the module-wide switch above:
# [mcp.servers.search]
# command = "npx"
# args = ["-y", "some-mcp-search-server"]
# enabled = true
# data_boundary = "internet" # local | lan | internet | unknown
# Optional overrides for a server whose tools have different reach:
# [mcp.servers.search.tool_boundaries]
# cached_lookup = "local"
