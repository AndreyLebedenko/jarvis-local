<!DOCTYPE html>
<html lang="en" data-state="idle" data-visibility="open" data-page="glance">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jarvis - Touchstrip</title>
<link rel="stylesheet" href="touchstrip.css">
</head>
<body>

<div class="screen">

  <div class="page show" id="pageGlance">
    <div class="g-left">
      <div class="orb-wrap">
        <div class="ring" id="ring" data-anim="normal"></div>
        <div class="orb-core"></div>
      </div>
      <div class="g-textblock">
        <div class="g-state" id="gState">Idle</div>
        <div class="g-sub" id="gSub"></div>
        <div class="g-model" id="gModel">...</div>
        <div class="g-visibility" id="gVisibility" onclick="toggleVisibilityFromGlance()">Open</div>
      </div>
    </div>
    <div class="g-chips">
      <div class="g-chip"><span class="g-dot" data-status="unavailable" id="dot-microphone"></span><span data-i18n="chip_microphone">Microphone</span></div>
      <div class="g-chip"><span class="g-dot" data-status="unavailable" id="dot-tts"></span><span data-i18n="chip_tts">TTS</span></div>
      <div class="g-chip"><span class="g-dot" data-status="unavailable" id="dot-memory"></span><span data-i18n="chip_memory">Memory</span></div>
      <div class="g-chip"><span class="g-dot" data-status="unavailable" id="dot-vision"></span><span data-i18n="chip_vision">Vision</span></div>
    </div>
  </div>

  <div class="page" id="pageActions">
    <div class="act-btn" id="thinkBtn" onclick="toggleThinking()">
      <div class="act-label" data-i18n="strip_think_label">Thinking</div>
      <div class="act-sub" id="thinkSub">level: off</div>
    </div>
    <div
      class="act-btn"
      id="resetBtn"
      onpointerdown="onResetHoldStart()"
      onpointerup="onResetHoldEnd()"
      onpointerleave="onResetHoldEnd()"
      onpointercancel="onResetHoldEnd()"
    >
      <div class="act-hold-fill"></div>
      <div class="act-label" data-i18n="btn_reset_context">Reset context</div>
      <div class="act-sub" id="resetSub" data-i18n="strip_reset_hold_hint">hold 1s to confirm</div>
    </div>
    <div
      class="act-btn"
      id="shutdownBtn"
      onpointerdown="onShutdownHoldStart()"
      onpointerup="onShutdownHoldEnd()"
      onpointerleave="onShutdownHoldEnd()"
      onpointercancel="onShutdownHoldEnd()"
    >
      <div class="act-hold-fill"></div>
      <div class="act-label" data-i18n="btn_shutdown">Shut down</div>
      <div class="act-sub" id="shutdownSub" data-i18n="strip_shutdown_hold_hint">hold 2s to confirm</div>
    </div>
  </div>

  <div class="dots">
    <button class="page-dot on" onclick="showPage('glance')" aria-label="Glance"></button>
    <button class="page-dot" onclick="showPage('actions')" aria-label="Actions"></button>
  </div>
</div>

<script src="contract.js"></script>
<script src="strings.js"></script>
<script src="transport.js"></script>
<script src="touchstrip.js"></script>
</body>
</html>
